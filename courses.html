 <div class="container">
    <h1>My Courses</h1>

    <!-- Adding form-->
     <form id="course-form">
    <div class="card">
      <h2 id="form-title">Add New Course</h2>
      <!-- ----------------------------------------------------------- -->

      <div class="field">
        <label for="course-name">Course Name</label>
        <input type="text" id="course-name" placeholder="e.g. Web Applications" required >
      </div>
<!-- ----------------------------------------------------------- -->

      <div class="field">
        <label for="course-code">Course Code</label>
        <input type="text" id="course-code" placeholder="e.g. SWE381" required>
      </div>
<!-- ----------------------------------------------------------- -->

      <div class="field">
        <label for="credit-hours">Credit Hours</label>
        <select id="credit-hours" required>
          <option value="1">1 Hour</option>
          <option value="2">2 Hours</option>
          <option value="3" selected>3 Hours</option>
          <option value="4">4 Hours</option>
        </select>
      </div>
<!-- ----------------------------------------------------------- -->

      <div class="field">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty"required >
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
<!-- ----------------------------------------------------------- -->

      <p class="error" id="error-msg"></p>

      <button type="submit" class="btn-add" id="submit-btn">Add Course</button>
        <button type="button" class="btn-cancel" id="cancel-btn" style="display:none;">Cancel</button>
    </div>
</form>
   <!-- courses list-->
    <div class="card">
      <h2>Course List</h2>
      
      <table id="courses-table" >
        <thead>
          <tr>
            <th>Course Name</th>
            <th>Code</th>
            <th>Credit Hours</th>
            <th>Difficulty</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="courses-body">
          <tr>
      <td>Web Applications</td>
      <td>SWE381</td>
      <td>3</td>
      <td>Medium</td>
      <td>
        <button type="button" class="btn-edit">Edit</button>
<button type="button" class="btn-remove">Remove</button>
      </td>
    </tr>
  </tbody>

      </table>
    </div>

  </div>
   <!-- Chatbot Button -->
   <div class="chat-icon">💬</div>
</body>
