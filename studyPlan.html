<!DOCTYPE html>
<html>
    <head>
        <title>Study Plan </title>
         <link rel="stylesheet" href="Style.css">

    </head>
    <body>
        <div id="nav-bar">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
        </div>
        <div id="main-contant">
            <h1>Smart Study Planner</h1>
            <div id="deadline-input">
                <h2>Add Studying Task</h2>
                <div id="input1">
                    <label>Task Description:</label>
                    <input type="text" id="taskInput" placeholder="e.g. Math Quiz 1">
                </div> 
                <div id="input2">
                    <label>Deadline Date:</label>
                    <input type="date" id="dateInput">
                </div>
                <div id="input3">
                    <label>Hours Needed:</label>
                    <input type="number" id="hoursInput">
                </div>
                <button class="btn" id="addDeadlineBtn">Add to List</button>
                <div id="added-task-container">
                    <h3>Tasks to be scheduled:</h3>
                    <ul id="taskListDisplay">
                        <p id="empty-message">No tasks added yet. Start typing above!</p>
                    </ul>
                </div>
            </div> 
            <hr>
            <div id="plan-control">
                <h2>Generate Plan</h2>
                <p>Ready to see your schedule? Click the button below.</p>
                <button class="btn" id="generatePlanBtn">Generate Study Plan</button>
            </div>
             <div id="plan-display">
                <h2>Your Schedule</h2>
                <div id="plan-output">
                    <p>No plan generated yet. Add tasks and click the button above!</p>
                </div>
            </div>
        </div>
        <script src="planner.JS"></script>
    </body>
</html>
